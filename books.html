<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ON'DA Book Store — Books</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"
          ><img src="logo.png" alt="ON'DA Book Store" width="110" height="110"
        /></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="books.html">Books</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="aboutus.html">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="subscription.html">✨ Subscribe</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <form
              class="d-flex"
              onsubmit="
                event.preventDefault();
                doSearch();
              "
            >
              <input
                id="searchBox"
                class="form-control me-2"
                type="text"
                placeholder="Search books, age..."
              />
              <button class="btn btn-search" type="submit">Search</button>
            </form>
            <div id="authNavArea"></div>
            <button id="cartBtn" class="btn-cart" onclick="openCart()">
              🛒 Cart <span class="cart-badge">0</span>
            </button>
          </div>
        </div>
      </div>
    </nav>
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3>🛒 My Cart</h3>
        <button class="btn-close-cart" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span><span id="cartTotal">$0</span>
        </div>
        <button class="btn-checkout" onclick="openPaymentModal()">
          Proceed to Checkout →
        </button>
        <button
          class="btn-view-cart"
          onclick="
            window.location.href = 'cart.html';
            closeCart();
          "
        >
          View Cart
        </button>
      </div>
    </div>

    <div class="modal-overlay" id="bookDetailModal">
      <div class="book-detail-modal" style="position: relative">
        <button class="btn-close-modal" onclick="closeBookDetail()">✕</button>
        <div class="book-detail-inner" id="bookDetailInner"></div>
      </div>
    </div>

    <div class="modal-overlay" id="pdfReaderModal">
      <div class="pdf-reader-modal" style="position: relative">
        <div class="pdf-reader-header">
          <h3 id="pdfReaderTitle">Reading</h3>
          <button
            class="btn-close-modal"
            onclick="closePdfReader()"
            style="position: static; font-size: 1.8rem"
          >
            ✕
          </button>
        </div>
        <div class="pdf-reader-body">
          <iframe id="pdfReaderFrame" src="" allowfullscreen></iframe>
        </div>
        <div
          style="
            text-align: center;
            padding: 0.8rem;
            border-top: 1px solid rgba(139, 193, 255, 0.2);
          "
        >
          <a
            id="pdfDownloadBtn"
            href="#"
            target="_blank"
            class="btn-detail-cart"
            style="
              display: inline-block;
              text-decoration: none;
              padding: 8px 20px;
              font-size: 0.9rem;
            "
            >⬇️ Download PDF</a
          >
        </div>
      </div>
    </div>

    <div class="container" id="content">
      <div class="col-12 text-center mt-5 mb-2">
        <h1 class="anabaslik">Our E-Books</h1>
      </div>

      <div id="searchBanner" style="display: none" class="search-banner">
        <span id="searchBannerText"></span>
        <button onclick="clearSearch()" class="btn-clear-search">
          ✕ Clear
        </button>
      </div>

      <div id="dynamicCatalog">
        <div style="text-align: center; padding: 5rem; color: #7a8db0">
          <h3 style="font-family: &quot;Playfair Display&quot;, serif">
            ⏳ Kitaplar Yükleniyor...
          </h3>
        </div>
      </div>
    </div>

    <footer class="footer text-center mt-5">
      <div class="container">
        <p>© 2025 ON'DA Book Store. All rights reserved.</p>
        <div class="mb-2">
          <a href="contact.html" class="mx-2">Contact</a>
          <a href="aboutus.html" class="mx-2">About Us</a>
          <a href="subscription.html" class="mx-2">Subscribe</a>
        </div>
        <div class="social-icons">
          <a href="#"><i class="bi bi-instagram"></i></a>
          <a href="#"><i class="bi bi-twitter-x"></i></a>
          <a href="#"><i class="bi bi-github"></i></a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="firebase.js"></script>
    <script src="cart.js"></script>

    <script type="module">
      import { auth, db } from "./auth.js";
      import {
        collection,
        getDocs,
        orderBy,
        query,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      window.BOOKS = {};

      // 1. VIP RADARI (Kullanıcı giriş yaptığında bilgilerini hafızaya alır)
      window.currentUserData = null;

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // Kullanıcının Firebase'deki dosyasını oku
          const docSnap = await getDoc(doc(db, "users", user.uid));
          if (docSnap.exists()) {
            window.currentUserData = docSnap.data();
          }
        } else {
          window.currentUserData = null; // Çıkış yaparsa bilgileri sıfırla
        }
      });

      // KİTAPLARI YÜKLEME FONKSİYONU
      async function buildCatalog() {
        const container = document.getElementById("dynamicCatalog");
        try {
          const q = query(
            collection(db, "books"),
            orderBy("createdAt", "desc"),
          );
          const snap = await getDocs(q);
          const books = snap.docs.map((d) => ({ id: d.id, ...d.data() }));

          if (books.length === 0) {
            container.innerHTML = `<div class="text-center" style="padding:4rem;"><h3>Vitrin Şimdilik Boş</h3><p>Admin panelinden kitap ekleyin!</p></div>`;
            return;
          }

          const grouped = { free: [], Paid: {} };
          books.forEach((b) => {
            window.BOOKS[b.id] = b;
            if (b.free) grouped.free.push(b);
            else {
              const cat = b.category || "Other";
              if (!grouped.Paid[cat]) grouped.Paid[cat] = [];
              grouped.Paid[cat].push(b);
            }
          });

          let html = "";

          // FREE KİTAPLAR
          if (grouped.free.length > 0) {
            html += `<h2 class="category-title">📖 Free to Read</h2>
                     <p class="category-desc">Start reading for free — no account needed.</p>
                     <div class="row g-4 mb-5 justify-content-center">`;
            grouped.free.forEach((b) => (html += createCardHtml(b)));
            html += `</div>`;
          }

          // DİĞER KATEGORİLER
          for (const cat in grouped.Paid) {
            let icon = "⚡";
            if (cat === "Activity") icon = "🎨";
            else if (cat === "Action") icon = "🚀";
            else if (cat === "Vehicles & Traffic") icon = "🚗";

            html += `<h2 class="category-title">${icon} ${cat} Books</h2>
                     <div class="row g-4 mb-5 justify-content-center">`;
            grouped.Paid[cat].forEach((b) => (html += createCardHtml(b)));
            html += `</div>`;
          }

          container.innerHTML = html;
          runSearchAndHash();
        } catch (error) {
          console.error(error);
          container.innerHTML = `<p class="text-center" style="color:red;">Kitaplar yüklenemedi.</p>`;
        }
      }

      function createCardHtml(b) {
        const priceBadge = b.free ? `<div class='free-badge'>FREE</div>` : "";
        const priceText = b.free ? `FREE` : `$${b.price}`;
        const btnText = b.free ? `Read Free` : `View Book`;
        const btnClass = b.free ? `btn-free` : ``;
        const ageTag = b.age ? `<div class="age-tag">Ages ${b.age}</div>` : "";

        return `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="book-card" onclick="openBookDetail('${b.id}')" style="cursor: pointer" data-age="${b.age || ""}" data-title="${(b.title || "").toLowerCase()}" data-category="${(b.category || "").toLowerCase()}">
              <img src="${b.cover || "monsterkapak.png"}" alt="${b.title}" onerror="this.src = 'monsterkapak.png'" />
              ${priceBadge}
              <div class="book-card-body">
                <div class="book-card-title">${b.title}</div>
                <div class="book-card-author">by ${b.author}</div>
                ${ageTag}
                <div class="d-flex justify-content-between align-items-center mt-2">
                  <span class="book-card-price">${priceText}</span>
                  <button class="btn-book ${btnClass}" onclick="openBookDetail('${b.id}'); event.stopPropagation();">${btnText}</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      document.addEventListener("DOMContentLoaded", buildCatalog);

      // --- SON BOSS: KİTAP DETAYLARI VE VIP KONTROLÜ ---
      window.openBookDetail = function (id) {
        const book = window.BOOKS[id];
        if (!book) return;

        // Kullanıcının VIP olup olmadığını kontrol et
        const isPremiumUser =
          window.currentUserData && window.currentUserData.subscriptionPlan;

        // Kullanıcı bu kitabı daha önce tekil olarak satın almış mı kontrol et (Kütüphanesinde var mı?)
        const ownsBook =
          window.currentUserData &&
          window.currentUserData.library &&
          window.currentUserData.library.some((b) => b.title === book.title);

        let priceHtml = "";

        if (book.free) {
          // 1. Durum: Kitap zaten ücretsizse herkese açık!
          priceHtml = `<span class="book-detail-price free">FREE</span>
             <button class="btn-detail-read" onclick="openPdfReader('${book.pdfUrl || ""}','${book.downloadUrl || ""}','${book.title}')">Read Now 📖</button>`;
        } else if (isPremiumUser || ownsBook) {
          // 2. Durum: Kullanıcı VIP abone veya bu kitabı zaten kütüphanesine satın almışsa (KAPILAR AÇILIR!)
          priceHtml = `<span class="book-detail-price" style="color:var(--accent); font-size:1.1rem; font-weight:700;">✨ VIP UNLOCKED</span>
             <button class="btn-detail-read" style="background:var(--accent); color:var(--navy); font-weight:bold;" onclick="openPdfReader('${book.pdfUrl || ""}','${book.downloadUrl || ""}','${book.title}')">Read Premium 🚀</button>`;
        } else {
          // 3. Durum: Kitap ücretli ve kullanıcı normal bir üye veya misafir (KAPILAR KAPALI!)
          priceHtml = `<span class="book-detail-price">$${book.price}</span>
             <button class="btn-detail-cart" onclick="addToCart('${book.title}',${book.price},'${book.author}'); closeBookDetail();">Add to Cart 🛒</button>
             <a href="subscription.html" class="btn-detail-sub">Subscribe & Save ✨</a>`;
        }

        document.getElementById("bookDetailInner").innerHTML = `
          <div class="book-detail-layout">
            <div class="book-detail-cover"><img src="${book.cover || "monsterkapak.png"}" alt="${book.title}" onerror="this.src='monsterkapak.png'"></div>
            <div class="book-detail-info">
              <h2 class="book-detail-title">${book.title}</h2>
              <p class="book-detail-author">by ${book.author}</p>
              <div class="book-detail-meta">
                <span>📄 ${book.pages || 0} pages</span>
                <span>🌐 ${book.lang || "English"}</span>
                ${book.age ? `<span>🎂 Ages ${book.age}</span>` : ""}
                ${book.free ? '<span class="badge-free">FREE</span>' : ""}
              </div>
              <p class="book-detail-desc">${book.desc || ""}</p>
              <div class="book-detail-actions">${priceHtml}</div>
            </div>
          </div>`;
        document.getElementById("bookDetailModal").classList.add("open");
        document.body.style.overflow = "hidden";
      };

      window.closeBookDetail = function () {
        document.getElementById("bookDetailModal").classList.remove("open");
        document.body.style.overflow = "";
      };

      window.openPdfReader = function (pdfUrl, downloadUrl, title) {
        if (!pdfUrl || pdfUrl === "undefined" || pdfUrl.trim() === "") {
          alert("PDF coming soon! 📖");
          return;
        }
        document.getElementById("pdfReaderTitle").textContent = title;
        document.getElementById("pdfReaderFrame").src = pdfUrl;
        document.getElementById("pdfDownloadBtn").href = downloadUrl || pdfUrl;
        document.getElementById("pdfReaderModal").classList.add("open");
        document.body.style.overflow = "hidden";
      };

      window.closePdfReader = function () {
        document.getElementById("pdfReaderModal").classList.remove("open");
        document.getElementById("pdfReaderFrame").src = "";
        document.body.style.overflow = "";
      };

      window.doSearch = function () {
        const term = document
          .getElementById("searchBox")
          .value.trim()
          .toLowerCase();
        if (!term) return;
        window.location.href = "books.html?search=" + encodeURIComponent(term);
      };

      window.clearSearch = function () {
        document.getElementById("searchBanner").style.display = "none";
        document
          .querySelectorAll(".book-card")
          .forEach((c) => (c.parentElement.style.display = ""));
        document
          .querySelectorAll(".category-title, .category-desc")
          .forEach((e) => (e.style.display = ""));
      };

      function runSearchAndHash() {
        const hash = window.location.hash;
        if (hash) {
          setTimeout(() => {
            const el = document.querySelector(hash);
            if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 300);
        }

        const params = new URLSearchParams(window.location.search);
        const search = params.get("search");
        if (search) {
          const term = search.toLowerCase();
          const banner = document.getElementById("searchBanner");
          const bannerText = document.getElementById("searchBannerText");
          let found = 0;

          document.querySelectorAll(".book-card").forEach((card) => {
            const col = card.parentElement;
            if (!col) return;
            const title = (card.dataset.title || "").toLowerCase();
            const age = (card.dataset.age || "").toLowerCase();
            const cat = (card.dataset.category || "").toLowerCase();

            const ageMatch =
              term.match(/(\d+)/) && age.includes(term.match(/(\d+)/)[1]);
            const titleMatch = title.includes(term);
            const catMatch = cat.includes(term);
            const ageWordMatch =
              (term.includes("toddler") && age.startsWith("2")) ||
              (term.includes("early") && age.startsWith("4")) ||
              (term.includes("young") &&
                parseInt(age) >= 6 &&
                parseInt(age) <= 9) ||
              (term.includes("pre-teen") && parseInt(age) >= 9);

            if (titleMatch || ageMatch || catMatch || ageWordMatch) {
              col.style.display = "";
              found++;
            } else {
              col.style.display = "none";
            }
          });

          bannerText.textContent = `${found} result${found !== 1 ? "s" : ""} for "${search}"`;
          banner.style.display = "flex";

          document.querySelectorAll(".row.g-4").forEach((row) => {
            const visible = [
              ...row.querySelectorAll('div[class*="col-"]'),
            ].filter((c) => c.style.display !== "none");
            const section = row.previousElementSibling;
            if (visible.length === 0 && section) {
              row.style.display = "none";
              if (section.classList.contains("category-title"))
                section.style.display = "none";
            }
          });

          setTimeout(() => {
            const first = document.querySelector(
              '.book-card:not([style*="none"])',
            );
            if (first)
              first.scrollIntoView({ behavior: "smooth", block: "center" });
          }, 400);
        }
      }

      document.addEventListener("click", (e) => {
        if (e.target === document.getElementById("bookDetailModal"))
          closeBookDetail();
        if (e.target === document.getElementById("pdfReaderModal"))
          closePdfReader();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeBookDetail();
          closePdfReader();
        }
      });
    </script>
    <div class="modal-overlay" id="authModal">
      <div class="auth-modal" style="position: relative">
        <button class="btn-close-modal" onclick="closeAuthModal()">✕</button>
        <div class="auth-tabs">
          <button
            class="auth-tab active"
            data-tab="signin"
            onclick="showAuthTab('signin')"
          >
            Sign In
          </button>
          <button
            class="auth-tab"
            data-tab="signup"
            onclick="showAuthTab('signup')"
          >
            Sign Up
          </button>
        </div>
        <button class="btn-google-auth" onclick="signInWithGoogle()">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            width="20"
          />
          Continue with Google
        </button>
        <div class="auth-divider"><span>or</span></div>
        <div id="signinForm">
          <div class="card-field">
            <label>Email</label
            ><input
              type="email"
              id="siEmail"
              class="form-control"
              placeholder="you@example.com"
            />
          </div>
          <div class="card-field">
            <label>Password</label
            ><input
              type="password"
              id="siPass"
              class="form-control"
              placeholder="••••••••"
            />
          </div>
          <p id="authError" class="auth-error"></p>
          <button class="btn-pay" onclick="handleSignIn()">Sign In</button>
        </div>
        <div id="signupForm" style="display: none">
          <div class="card-field">
            <label>Full Name</label
            ><input
              type="text"
              id="suName"
              class="form-control"
              placeholder="Your name"
            />
          </div>
          <div class="card-field">
            <label>Email</label
            ><input
              type="email"
              id="suEmail"
              class="form-control"
              placeholder="you@example.com"
            />
          </div>
          <div class="card-field">
            <label>Password</label
            ><input
              type="password"
              id="suPass"
              class="form-control"
              placeholder="Min. 6 characters"
            />
          </div>
          <div class="card-field">
            <label>Confirm Password</label
            ><input
              type="password"
              id="suPass2"
              class="form-control"
              placeholder="Repeat password"
            />
          </div>
          <p id="authError" class="auth-error"></p>
          <button class="btn-pay" onclick="handleSignUp()">
            Create Account
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="auth.js"></script>
  </body>
</html>
