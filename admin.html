<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ON'DA Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap");
      :root {
        --navy: #2e4b88;
        --navy-light: #4a6ab8;
        --accent: #8bc1ff;
        --accent2: #dcacf8;
        --bg: #f4f7ff;
        --card: #fff;
        --radius: 16px;
        --shadow: 0 4px 20px rgba(46, 75, 136, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--navy);
        margin: 0;
      }

      .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: var(--card);
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 400px;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .login-card h2 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        margin-bottom: 0.3rem;
      }
      .login-input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #dce6f5;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      .btn-login {
        width: 100%;
        padding: 13px;
        background: var(--navy);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .login-error {
        color: #e74c3c;
        font-size: 0.85rem;
        margin-top: 0.5rem;
        display: none;
      }

      .admin-layout {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 240px;
        background: var(--navy);
        color: #fff;
        padding: 1.5rem 1rem;
        flex-shrink: 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
      }
      .sidebar-logo {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        margin-bottom: 2rem;
        text-align: center;
      }
      .nav-item-admin {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 4px;
      }
      .nav-item-admin:hover,
      .nav-item-admin.active {
        background: rgba(255, 255, 255, 0.15);
      }

      .main-area {
        margin-left: 240px;
        flex: 1;
        padding: 2rem;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .topbar h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        margin: 0;
      }
      .btn-primary-admin {
        background: var(--navy);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .stat-card .stat-num {
        font-size: 2rem;
        font-weight: 700;
        color: var(--navy);
      }

      .section-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        margin-bottom: 2rem;
      }
      .books-table {
        width: 100%;
        border-collapse: collapse;
      }
      .books-table th {
        background: #f4f7ff;
        padding: 10px;
        text-align: left;
        font-size: 0.8rem;
        color: #7a8db0;
      }
      .books-table td {
        padding: 12px;
        border-bottom: 1px solid #f0f4ff;
      }
      .book-cover-thumb {
        width: 40px;
        height: 52px;
        object-fit: cover;
        border-radius: 6px;
      }
      .badge-free {
        background: #d4f8e1;
        color: #27ae60;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.75rem;
      }
      .badge-paid {
        background: #e8f0ff;
        color: var(--navy);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.75rem;
      }
      .btn-edit {
        background: none;
        border: 1.5px solid var(--accent);
        color: var(--navy);
        border-radius: 8px;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .btn-delete {
        background: none;
        border: 1.5px solid #ffb3b3;
        color: #e74c3c;
        border-radius: 8px;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 0.8rem;
        margin-left: 6px;
      }

      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-bg.open {
        display: flex;
      }
      .modal-box {
        background: #fff;
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .form-label-admin {
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--navy);
        display: block;
        margin-bottom: 5px;
      }
      .form-input-admin {
        width: 100%;
        padding: 10px;
        border: 1.5px solid #dce6f5;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .btn-save {
        background: var(--navy);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-weight: 700;
        cursor: pointer;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="login-screen" id="loginScreen">
      <div class="login-card">
        <div style="font-size: 3rem; margin-bottom: 0.5rem">📚</div>
        <h2>ON'DA Admin</h2>
        <input
          class="login-input"
          type="email"
          id="adminEmail"
          placeholder="Admin email"
        />
        <input
          class="login-input"
          type="password"
          id="adminPass"
          placeholder="Password"
        />
        <button class="btn-login" onclick="adminLogin()">Sign In</button>
        <p class="login-error" id="loginError">Invalid credentials.</p>
      </div>
    </div>

    <div class="admin-layout" id="adminPanel" style="display: none">
      <div class="sidebar">
        <div class="sidebar-logo">ON'DA <span>Admin Panel</span></div>
        <div class="nav-item-admin active" onclick="showTab('dashboard', this)">
          <i class="bi bi-grid"></i> Dashboard
        </div>
        <div class="nav-item-admin" onclick="showTab('books', this)">
          <i class="bi bi-book"></i> Books
        </div>
        <div
          style="
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 2rem;
          "
        >
          <div
            class="nav-item-admin"
            onclick="window.open('index.html', '_blank')"
          >
            <i class="bi bi-box-arrow-up-right"></i> View Site
          </div>
          <div class="nav-item-admin" onclick="adminLogout()">
            <i class="bi bi-box-arrow-left"></i> Sign Out
          </div>
        </div>
      </div>

      <div class="main-area">
        <div class="tab-content active" id="tab-dashboard">
          <div class="topbar">
            <h1>Dashboard</h1>
            <span id="welcomeMsg"></span>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">📚</div>
              <div class="stat-num" id="statBooks">0</div>
              <div class="stat-label">Total Books</div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="tab-books">
          <div class="topbar">
            <h1>Books</h1>
            <button class="btn-primary-admin" onclick="openBookModal()">
              <i class="bi bi-plus-lg"></i> Add New Book
            </button>
          </div>
          <div class="section-card">
            <table class="books-table">
              <thead>
                <tr>
                  <th>Cover</th>
                  <th>Title</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="booksTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-bg" id="bookModal">
      <div class="modal-box">
        <h3 id="bookModalTitle">Add New Book</h3>
        <input type="hidden" id="editBookId" />

        <label class="form-label-admin">Book Title *</label>
        <input
          class="form-input-admin"
          type="text"
          id="bTitle"
          placeholder="The Tale of Monster Falls"
        />

        <label class="form-label-admin">Author *</label>
        <input
          class="form-input-admin"
          type="text"
          id="bAuthor"
          placeholder="Ada Nisa Özcan"
        />

        <div class="form-row">
          <div>
            <label class="form-label-admin">Price ($) — 0 for free</label>
            <input
              class="form-input-admin"
              type="number"
              id="bPrice"
              placeholder="0"
            />
          </div>
          <div>
            <label class="form-label-admin">Age Range</label>
            <input
              class="form-input-admin"
              type="text"
              id="bAge"
              placeholder="e.g. 4-8"
            />
          </div>
        </div>

        <div class="form-row">
          <div>
            <label class="form-label-admin">Category</label>
            <select class="form-input-admin" id="bCategory">
              <option>Adventure</option>
              <option>Activity</option>
              <option>Action</option>
              <option>Vehicles & Traffic</option>
            </select>
          </div>
          <div>
            <label class="form-label-admin">Pages</label>
            <input
              class="form-input-admin"
              type="number"
              id="bPages"
              placeholder="12"
            />
          </div>
        </div>

        <label class="form-label-admin">Cover Image Name</label>
        <input
          class="form-input-admin"
          type="text"
          id="bCover"
          placeholder="monsterkapak.png"
        />

        <label class="form-label-admin"
          >PDF View URL (Google Drive Preview Link)</label
        >
        <input
          class="form-input-admin"
          type="text"
          id="bPdfUrl"
          placeholder="https://drive.google.com/file/d/.../preview"
        />

        <label class="form-label-admin"
          >PDF Download URL (Google Drive Export Link)</label
        >
        <input
          class="form-input-admin"
          type="text"
          id="bDownloadUrl"
          placeholder="https://drive.google.com/uc?export=download&id=..."
        />

        <label class="form-label-admin">Description</label>
        <textarea class="form-input-admin" id="bDesc" rows="3"></textarea>

        <div style="margin-top: 0.5rem">
          <button class="btn-save" id="btnSaveBook" onclick="saveBook()">
            Save Book
          </button>
          <button
            class="btn-save"
            style="background: #7a8db0; margin-left: 8px"
            onclick="closeBookModal()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        updateDoc,
        deleteDoc,
        doc,
        serverTimestamp,
        orderBy,
        query,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      const app = initializeApp({
        apiKey: "AIzaSyDhBmp8esSlzkOUqZo41Qx1N0lxc2zvJDY",
        authDomain: "ondabooks.firebaseapp.com",
        projectId: "ondabooks",
        storageBucket: "ondabooks.firebasestorage.app",
        messagingSenderId: "183667962834",
        appId: "1:183667962834:web:1d64a9932137224cee4e0b",
      });
      const db = getFirestore(app);

      window.adminLogin = function () {
        if (
          document.getElementById("adminEmail").value ===
            "admin@ondabooks.com" &&
          document.getElementById("adminPass").value === "onda2025!"
        ) {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("adminPanel").style.display = "flex";
          loadBooks();
        } else document.getElementById("loginError").style.display = "block";
      };

      window.adminLogout = function () {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminPanel").style.display = "none";
      };

      window.showTab = function (name, el) {
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".nav-item-admin")
          .forEach((n) => n.classList.remove("active"));
        document.getElementById("tab-" + name).classList.add("active");
        el.classList.add("active");
      };

      let localBooks = [];
      async function loadBooks() {
        const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        localBooks = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        renderBooksTable();
      }

      function renderBooksTable() {
        const tbody = document.getElementById("booksTableBody");
        tbody.innerHTML = localBooks
          .map(
            (b) => `
    <tr>
      <td><img src="${b.cover || "monsterkapak.png"}" class="book-cover-thumb"></td>
      <td style="font-weight:600">${b.title}</td>
      <td>${b.category || "Other"}</td>
      <td><span class="${b.free ? "badge-free" : "badge-paid"}">${b.free ? "FREE" : "$" + b.price}</span></td>
      <td>
        <button class="btn-edit" onclick="editBook('${b.id}')">✏️ Edit</button>
        <button class="btn-delete" onclick="deleteBook('${b.id}')">🗑</button>
      </td>
    </tr>`,
          )
          .join("");
        document.getElementById("statBooks").textContent = localBooks.length;
      }

      window.openBookModal = function (id = null) {
        document.getElementById("editBookId").value = id || "";
        if (id) {
          const b = localBooks.find((x) => x.id === id);
          document.getElementById("bTitle").value = b.title;
          document.getElementById("bAuthor").value = b.author;
          document.getElementById("bPrice").value = b.price;
          document.getElementById("bAge").value = b.age || "";
          document.getElementById("bCategory").value =
            b.category || "Adventure";
          document.getElementById("bPages").value = b.pages || "";
          document.getElementById("bCover").value = b.cover || "";
          document.getElementById("bPdfUrl").value = b.pdfUrl || "";
          document.getElementById("bDownloadUrl").value = b.downloadUrl || "";
          document.getElementById("bDesc").value = b.desc || "";
        } else {
          [
            "bTitle",
            "bAuthor",
            "bPrice",
            "bAge",
            "bPages",
            "bCover",
            "bPdfUrl",
            "bDownloadUrl",
            "bDesc",
          ].forEach((i) => (document.getElementById(i).value = ""));
          document.getElementById("bAuthor").value = "Ada Nisa Özcan";
        }
        document.getElementById("bookModal").classList.add("open");
      };

      window.editBook = (id) => openBookModal(id);
      window.closeBookModal = () =>
        document.getElementById("bookModal").classList.remove("open");

      window.saveBook = async function () {
        const id = document.getElementById("editBookId").value;
        const priceVal =
          parseFloat(document.getElementById("bPrice").value) || 0;
        const data = {
          title: document.getElementById("bTitle").value,
          author: document.getElementById("bAuthor").value,
          price: priceVal,
          age: document.getElementById("bAge").value,
          pages: parseInt(document.getElementById("bPages").value) || 0,
          category: document.getElementById("bCategory").value,
          cover: document.getElementById("bCover").value || "monsterkapak.png",
          pdfUrl: document.getElementById("bPdfUrl").value,
          downloadUrl: document.getElementById("bDownloadUrl").value,
          desc: document.getElementById("bDesc").value,
          free: priceVal === 0,
          lang: "English",
        };

        const btn = document.getElementById("btnSaveBook");
        btn.innerText = "⏳ Saving...";
        btn.disabled = true;
        try {
          if (id)
            await updateDoc(doc(db, "books", id), {
              ...data,
              updatedAt: serverTimestamp(),
            });
          else
            await addDoc(collection(db, "books"), {
              ...data,
              createdAt: serverTimestamp(),
            });
          closeBookModal();
          loadBooks();
        } catch (e) {
          alert("Hata: " + e.message);
        } finally {
          btn.innerText = "Save Book";
          btn.disabled = false;
        }
      };

      window.deleteBook = async function (id) {
        if (confirm("Silmek istediğine emin misin?")) {
          await deleteDoc(doc(db, "books", id));
          loadBooks();
        }
      };
    </script>
  </body>
</html>
